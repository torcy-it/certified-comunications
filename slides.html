<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slides — Adolfo Torcicollo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
    .viewer-nav {
      height: 52px;
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-dark);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 10px;
      background: var(--accent);
      transition: opacity 0.2s;
    }
    .back-btn:hover { opacity: 0.75; }
    .viewer-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <nav class="viewer-nav">
    <a href="index.html" class="back-btn">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Indietro
    </a>
    <span class="viewer-title">Presentazione — Comunicazioni Certificate</span>
  </nav>
  <iframe src="presentazione_finale_tesi.pdf" title="Presentazione"></iframe>
</body>
</html>
